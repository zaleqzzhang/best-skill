# quant config — 请按需修改
data:
  source: "akshare"  # 或 "tushare"（需 token）
  tushare_token: ""   # 申请地址：https://tushare.pro
  akshare_proxy: null

backtest:
  initial_cash: 1000000
  commission: 0.0005   # 万5手续费
  slippage: 0.001      # 千1滑点
  timezone: "Asia/Shanghai"

risk:
  max_drawdown: 0.15   # 最大回撤阈值 15%
  target_sharpe: 1.2
  position_limit: 0.2  # 单股仓位上限 20%

ui:
  notify: true         # 是否启用 Windows 弹窗提醒
  voice_alert: "Nova"  # TTS 语音（需配置）