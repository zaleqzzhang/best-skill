<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" width="960" height="640">
  <defs>
    <style>
      @font-face {
        font-family: 'Anthropic Sans';
        src: url('https://cdn.prod.website-files.com/67ce28cfec624e2b733f8a52/69971a00a3295036497e1a28_AnthropicSans-Roman-Web.woff2') format('woff2');
        font-weight: 100 900;
        font-style: normal;
      }
      @font-face {
        font-family: 'Anthropic Sans';
        src: url('https://cdn.prod.website-files.com/67ce28cfec624e2b733f8a52/69971a016067bf14b9b8f48d_AnthropicSans-Italic-Web.woff2') format('woff2');
        font-weight: 100 900;
        font-style: italic;
      }
      text, tspan {
        font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', sans-serif;
      }
    </style>
    <marker id="ah" viewBox="0 0 10 7" refX="9.5" refY="3.5"
      markerWidth="7" markerHeight="5.5" orient="auto">
      <path d="M 0 0.6 L 9.5 3.5 L 0 6.4" fill="none" stroke="#b0afa9" stroke-width="1.3" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 大背景 -->
  <rect x="0" y="0" width="960" height="640" rx="22" ry="22" fill="#f0efed"/>

  <!-- ====== 标题 ====== -->
  <text x="480" y="52" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a1a" letter-spacing="4">
    在线并行部署架构
  </text>

  <!-- ====== 上分组：传统搜索路径 ====== -->
  <rect x="230" y="82" width="480" height="140" rx="12" ry="12"
    fill="none" stroke="#c4c3bf" stroke-width="1.6" stroke-dasharray="8,5"/>
  <text x="248" y="104" font-size="13" fill="#8c8b87" font-weight="400" letter-spacing="0.5">传统搜索路径</text>

  <!-- ====== 下分组：个性化改写路径 ====== -->
  <rect x="230" y="308" width="480" height="210" rx="12" ry="12"
    fill="none" stroke="#c4c3bf" stroke-width="1.6" stroke-dasharray="8,5"/>
  <text x="248" y="330" font-size="13" fill="#8c8b87" font-weight="400" letter-spacing="0.5">个性化改写路径</text>

  <!-- ====== 用户请求（白底） ====== -->
  <rect x="48" y="265" width="126" height="60" rx="10" ry="10" fill="#ffffff" stroke="#d8d7d3" stroke-width="1.4"/>
  <text x="111" y="300" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a1a">用户请求</text>

  <!-- ====== 上路径节点 ====== -->

  <!-- 文本召回 -->
  <rect x="268" y="130" width="126" height="56" rx="10" ry="10" fill="#cce0f0"/>
  <text x="331" y="163" text-anchor="middle" font-size="16" font-weight="600" fill="#1c5a82">文本召回</text>

  <!-- 向量召回 -->
  <rect x="428" y="130" width="126" height="56" rx="10" ry="10" fill="#cce0f0"/>
  <text x="491" y="163" text-anchor="middle" font-size="16" font-weight="600" fill="#1c5a82">向量召回</text>

  <!-- Cand_main -->
  <rect x="590" y="130" width="100" height="56" rx="10" ry="10" fill="#cce0f0"/>
  <text x="640" y="163" text-anchor="middle" font-size="14" font-weight="600" fill="#1c5a82">Cand_main</text>

  <!-- ====== 下路径节点 ====== -->

  <!-- 上下文 -->
  <rect x="268" y="370" width="110" height="60" rx="10" ry="10" fill="#ffffff" stroke="#d8d7d3" stroke-width="1.4"/>
  <text x="323" y="398" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a1a">上下文</text>
  <text x="323" y="416" text-anchor="middle" font-size="11.5" fill="#999">C_u</text>

  <!-- LLM 改写 -->
  <rect x="418" y="370" width="126" height="60" rx="10" ry="10" fill="#cce0f0"/>
  <text x="481" y="398" text-anchor="middle" font-size="16" font-weight="600" fill="#1c5a82">LLM 改写</text>
  <text x="481" y="416" text-anchor="middle" font-size="11.5" fill="#5a96b8">Q_rew</text>

  <!-- Fake 索引 -->
  <rect x="580" y="370" width="120" height="60" rx="10" ry="10" fill="#f0d5c6"/>
  <text x="640" y="398" text-anchor="middle" font-size="16" font-weight="600" fill="#8c3b1a">Fake 索引</text>
  <text x="640" y="416" text-anchor="middle" font-size="11.5" fill="#b86a48">O(1) 查询</text>

  <!-- Cand_fake -->
  <rect x="600" y="460" width="86" height="32" rx="7" ry="7" fill="#d4edda"/>
  <text x="643" y="481" text-anchor="middle" font-size="12.5" font-weight="500" fill="#256b3a">Cand_fake</text>

  <!-- ====== 右侧汇聚 ====== -->

  <!-- 融合精排 -->
  <rect x="776" y="240" width="120" height="62" rx="10" ry="10" fill="#c8e8da"/>
  <text x="836" y="267" text-anchor="middle" font-size="16" font-weight="600" fill="#1a6b50">融合精排</text>
  <text x="836" y="286" text-anchor="middle" font-size="11.5" fill="#509878">统一打分排序</text>

  <!-- 相关性过滤 -->
  <rect x="776" y="368" width="120" height="62" rx="10" ry="10" fill="#c8e8da"/>
  <text x="836" y="395" text-anchor="middle" font-size="16" font-weight="600" fill="#1a6b50">相关性过滤</text>
  <text x="836" y="414" text-anchor="middle" font-size="11.5" fill="#509878">Query-Doc</text>

  <!-- 结果 -->
  <rect x="800" y="120" width="78" height="42" rx="10" ry="10" fill="#c8e8da"/>
  <text x="839" y="147" text-anchor="middle" font-size="15" font-weight="600" fill="#1a6b50">结果</text>

  <!-- 并行标注 -->
  <text x="180" y="312" font-size="12.5" fill="#aaa9a5" font-style="italic">并行</text>

  <!-- ====== 底部说明 ====== -->
  <rect x="48" y="574" width="380" height="40" rx="10" ry="10" fill="#ffffff" stroke="#d8d7d3" stroke-width="1.4"/>
  <text x="238" y="599" text-anchor="middle" font-size="13" fill="#8c8b87" letter-spacing="0.8">
    两条路径并行执行，端到端延迟零增长
  </text>

  <!-- ====== 箭头连线 ====== -->

  <!-- 用户请求 → 文本召回（上） -->
  <polyline points="174,295 205,295 205,158 266,158"
    stroke="#b0afa9" stroke-width="1.4" fill="none" marker-end="url(#ah)"/>

  <!-- 用户请求 → 上下文（下） -->
  <polyline points="174,295 205,295 205,400 266,400"
    stroke="#b0afa9" stroke-width="1.4" fill="none" marker-end="url(#ah)"/>

  <!-- 文本召回 → 向量召回 -->
  <line x1="394" y1="158" x2="426" y2="158" stroke="#b0afa9" stroke-width="1.4" marker-end="url(#ah)"/>

  <!-- 向量召回 → Cand_main -->
  <line x1="554" y1="158" x2="588" y2="158" stroke="#b0afa9" stroke-width="1.4" marker-end="url(#ah)"/>

  <!-- 上下文 → LLM 改写 -->
  <line x1="378" y1="400" x2="416" y2="400" stroke="#b0afa9" stroke-width="1.4" marker-end="url(#ah)"/>

  <!-- LLM 改写 → Fake 索引 -->
  <line x1="544" y1="400" x2="578" y2="400" stroke="#b0afa9" stroke-width="1.4" marker-end="url(#ah)"/>

  <!-- Fake 索引 → Cand_fake -->
  <line x1="640" y1="430" x2="640" y2="458" stroke="#b0afa9" stroke-width="1.4" marker-end="url(#ah)"/>

  <!-- Cand_main → 融合精排 -->
  <polyline points="690,158 730,158 730,264 774,264"
    stroke="#b0afa9" stroke-width="1.4" fill="none" marker-end="url(#ah)"/>

  <!-- Cand_fake → 相关性过滤 -->
  <polyline points="686,476 740,476 740,400 774,400"
    stroke="#b0afa9" stroke-width="1.4" fill="none" marker-end="url(#ah)"/>

  <!-- 相关性过滤 → 融合精排 -->
  <line x1="836" y1="368" x2="836" y2="304" stroke="#b0afa9" stroke-width="1.4" marker-end="url(#ah)"/>

  <!-- 融合精排 → 结果 -->
  <line x1="840" y1="240" x2="840" y2="164" stroke="#b0afa9" stroke-width="1.4" marker-end="url(#ah)"/>

</svg>
