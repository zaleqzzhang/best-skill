<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480">
  <defs>
    <style>
      @font-face {
        font-family: 'Anthropic Sans';
        src: url('https://cdn.prod.website-files.com/67ce28cfec624e2b733f8a52/69971a00a3295036497e1a28_AnthropicSans-Roman-Web.woff2') format('woff2');
        font-weight: 100 900; font-style: normal;
      }
      text, tspan { font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
    <marker id="ah" viewBox="0 0 10 7" refX="9.5" refY="3.5" markerWidth="7" markerHeight="5.5" orient="auto">
      <path d="M 0 0.6 L 9.5 3.5 L 0 6.4" fill="none" stroke="#b0afa9" stroke-width="1.3" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect x="0" y="0" width="900" height="480" rx="22" ry="22" fill="#f0efed"/>

  <!-- Title -->
  <text x="450" y="48" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a1a" letter-spacing="4">缓存策略对比</text>

  <!-- ====== 左侧：方案 A ====== -->
  <rect x="40" y="78" width="390" height="360" rx="12" ry="12" fill="none" stroke="#c4c3bf" stroke-width="1.6" stroke-dasharray="8,5"/>
  <text x="64" y="102" font-size="13" fill="#8c8b87">方案 A：Cache-Aside</text>

  <rect x="160" y="120" width="140" height="50" rx="10" ry="10" fill="#c8e8da"/>
  <text x="230" y="150" text-anchor="middle" font-size="15" font-weight="600" fill="#1a6b50">应用层</text>

  <rect x="80" y="220" width="120" height="50" rx="10" ry="10" fill="#cce0f0"/>
  <text x="140" y="250" text-anchor="middle" font-size="14" font-weight="600" fill="#1c5a82">缓存</text>

  <rect x="260" y="220" width="120" height="50" rx="10" ry="10" fill="#ffffff" stroke="#d8d7d3" stroke-width="1.4"/>
  <text x="320" y="250" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">数据库</text>

  <!-- A 的箭头 -->
  <polyline points="200,170 140,218" stroke="#b0afa9" stroke-width="1.4" fill="none" marker-end="url(#ah)"/>
  <polyline points="260,170 320,218" stroke="#b0afa9" stroke-width="1.4" fill="none" marker-end="url(#ah)"/>
  <text x="145" y="192" font-size="11" fill="#aaa9a5">1. 查缓存</text>
  <text x="278" y="192" font-size="11" fill="#aaa9a5">2. 查库</text>

  <!-- A 优缺点 -->
  <rect x="68" y="300" width="110" height="30" rx="7" ry="7" fill="#d4edda"/>
  <text x="123" y="320" text-anchor="middle" font-size="12" font-weight="500" fill="#256b3a">✓ 实现简单</text>
  <rect x="68" y="340" width="150" height="30" rx="7" ry="7" fill="#d4edda"/>
  <text x="143" y="360" text-anchor="middle" font-size="12" font-weight="500" fill="#256b3a">✓ 按需缓存</text>
  <rect x="68" y="380" width="170" height="30" rx="7" ry="7" fill="#f0d5c6"/>
  <text x="153" y="400" text-anchor="middle" font-size="12" font-weight="500" fill="#8c3b1a">✗ 首次必穿透</text>

  <!-- ====== 中间分隔 ====== -->
  <text x="450" y="265" text-anchor="middle" font-size="16" font-weight="600" fill="#c4c3bf">VS</text>

  <!-- ====== 右侧：方案 B ====== -->
  <rect x="470" y="78" width="390" height="360" rx="12" ry="12" fill="none" stroke="#c4c3bf" stroke-width="1.6" stroke-dasharray="8,5"/>
  <text x="494" y="102" font-size="13" fill="#8c8b87">方案 B：Write-Through</text>

  <rect x="590" y="120" width="140" height="50" rx="10" ry="10" fill="#c8e8da"/>
  <text x="660" y="150" text-anchor="middle" font-size="15" font-weight="600" fill="#1a6b50">应用层</text>

  <rect x="590" y="220" width="140" height="50" rx="10" ry="10" fill="#cce0f0"/>
  <text x="660" y="250" text-anchor="middle" font-size="14" font-weight="600" fill="#1c5a82">缓存 + DB</text>

  <!-- B 的箭头 -->
  <line x1="660" y1="170" x2="660" y2="218" stroke="#b0afa9" stroke-width="1.4" marker-end="url(#ah)"/>
  <text x="680" y="198" font-size="11" fill="#aaa9a5">同步写入</text>

  <!-- B 优缺点 -->
  <rect x="498" y="300" width="130" height="30" rx="7" ry="7" fill="#d4edda"/>
  <text x="563" y="320" text-anchor="middle" font-size="12" font-weight="500" fill="#256b3a">✓ 强一致性</text>
  <rect x="498" y="340" width="140" height="30" rx="7" ry="7" fill="#d4edda"/>
  <text x="568" y="360" text-anchor="middle" font-size="12" font-weight="500" fill="#256b3a">✓ 无缓存穿透</text>
  <rect x="498" y="380" width="160" height="30" rx="7" ry="7" fill="#f0d5c6"/>
  <text x="578" y="400" text-anchor="middle" font-size="12" font-weight="500" fill="#8c3b1a">✗ 写入延迟高</text>

</svg>
