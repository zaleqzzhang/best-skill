<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 720" width="640" height="720">
  <defs>
    <style>
      @font-face {
        font-family: 'Anthropic Sans';
        src: url('https://cdn.prod.website-files.com/67ce28cfec624e2b733f8a52/69971a00a3295036497e1a28_AnthropicSans-Roman-Web.woff2') format('woff2');
        font-weight: 100 900; font-style: normal;
      }
      text, tspan { font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
    <marker id="ah" viewBox="0 0 10 7" refX="9.5" refY="3.5" markerWidth="7" markerHeight="5.5" orient="auto">
      <path d="M 0 0.6 L 9.5 3.5 L 0 6.4" fill="none" stroke="#b0afa9" stroke-width="1.3" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect x="0" y="0" width="640" height="720" rx="22" ry="22" fill="#f0efed"/>

  <!-- Title -->
  <text x="320" y="48" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a1a" letter-spacing="4">请求处理流程</text>

  <!-- 开始 -->
  <rect x="240" y="76" width="160" height="48" rx="24" ry="24" fill="#c8e8da"/>
  <text x="320" y="106" text-anchor="middle" font-size="15" font-weight="600" fill="#1a6b50">接收请求</text>

  <!-- 参数校验 -->
  <rect x="230" y="160" width="180" height="56" rx="10" ry="10" fill="#cce0f0"/>
  <text x="320" y="193" text-anchor="middle" font-size="16" font-weight="600" fill="#1c5a82">参数校验</text>

  <!-- 决策：是否合法 -->
  <polygon points="320,252 420,296 320,340 220,296" fill="#ffffff" stroke="#d8d7d3" stroke-width="1.4"/>
  <text x="320" y="300" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">是否合法?</text>

  <!-- 否 → 返回错误 -->
  <rect x="460" y="272" width="130" height="48" rx="10" ry="10" fill="#f0d5c6"/>
  <text x="525" y="301" text-anchor="middle" font-size="15" font-weight="600" fill="#8c3b1a">返回错误</text>
  <line x1="420" y1="296" x2="458" y2="296" stroke="#b0afa9" stroke-width="1.4" marker-end="url(#ah)"/>
  <text x="435" y="288" text-anchor="middle" font-size="11" fill="#aaa9a5">否</text>

  <!-- 是 → 业务处理 -->
  <rect x="230" y="376" width="180" height="56" rx="10" ry="10" fill="#cce0f0"/>
  <text x="320" y="400" text-anchor="middle" font-size="16" font-weight="600" fill="#1c5a82">业务逻辑处理</text>
  <text x="320" y="418" text-anchor="middle" font-size="11.5" fill="#5a96b8">核心计算</text>
  <line x1="320" y1="340" x2="320" y2="374" stroke="#b0afa9" stroke-width="1.4" marker-end="url(#ah)"/>
  <text x="330" y="362" font-size="11" fill="#aaa9a5">是</text>

  <!-- 写入数据库 -->
  <rect x="230" y="468" width="180" height="56" rx="10" ry="10" fill="#cce0f0"/>
  <text x="320" y="492" text-anchor="middle" font-size="16" font-weight="600" fill="#1c5a82">写入数据库</text>
  <text x="320" y="510" text-anchor="middle" font-size="11.5" fill="#5a96b8">持久化</text>
  <line x1="320" y1="432" x2="320" y2="466" stroke="#b0afa9" stroke-width="1.4" marker-end="url(#ah)"/>

  <!-- 发送通知 -->
  <rect x="230" y="560" width="180" height="56" rx="10" ry="10" fill="#ffffff" stroke="#d8d7d3" stroke-width="1.4"/>
  <text x="320" y="584" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a1a">发送通知</text>
  <text x="320" y="602" text-anchor="middle" font-size="11.5" fill="#999">异步</text>
  <line x1="320" y1="524" x2="320" y2="558" stroke="#b0afa9" stroke-width="1.4" marker-end="url(#ah)"/>

  <!-- 返回结果 -->
  <rect x="240" y="652" width="160" height="48" rx="24" ry="24" fill="#c8e8da"/>
  <text x="320" y="682" text-anchor="middle" font-size="15" font-weight="600" fill="#1a6b50">返回成功</text>
  <line x1="320" y1="616" x2="320" y2="650" stroke="#b0afa9" stroke-width="1.4" marker-end="url(#ah)"/>

</svg>
