<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560">
  <defs>
    <style>
      @font-face {
        font-family: 'Anthropic Sans';
        src: url('https://cdn.prod.website-files.com/67ce28cfec624e2b733f8a52/69971a00a3295036497e1a28_AnthropicSans-Roman-Web.woff2') format('woff2');
        font-weight: 100 900; font-style: normal;
      }
      text, tspan { font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
    <marker id="ah" viewBox="0 0 10 7" refX="9.5" refY="3.5" markerWidth="7" markerHeight="5.5" orient="auto">
      <path d="M 0 0.6 L 9.5 3.5 L 0 6.4" fill="none" stroke="#b0afa9" stroke-width="1.3" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect x="0" y="0" width="800" height="560" rx="22" ry="22" fill="#f0efed"/>

  <!-- Title -->
  <text x="400" y="48" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a1a" letter-spacing="4">微服务分层架构</text>

  <!-- Layer 1: 接入层 -->
  <rect x="48" y="78" width="704" height="70" rx="12" ry="12" fill="none" stroke="#c4c3bf" stroke-width="1.6" stroke-dasharray="8,5"/>
  <text x="72" y="100" font-size="13" fill="#8c8b87">接入层</text>
  <rect x="170" y="92" width="130" height="42" rx="10" ry="10" fill="#c8e8da"/>
  <text x="235" y="118" text-anchor="middle" font-size="14" font-weight="600" fill="#1a6b50">API Gateway</text>
  <rect x="340" y="92" width="130" height="42" rx="10" ry="10" fill="#c8e8da"/>
  <text x="405" y="118" text-anchor="middle" font-size="14" font-weight="600" fill="#1a6b50">Load Balancer</text>
  <rect x="510" y="92" width="110" height="42" rx="10" ry="10" fill="#ffffff" stroke="#d8d7d3" stroke-width="1.4"/>
  <text x="565" y="118" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">WAF</text>

  <!-- 箭头：接入层 → 服务层 -->
  <line x1="400" y1="148" x2="400" y2="178" stroke="#b0afa9" stroke-width="1.4" marker-end="url(#ah)"/>

  <!-- Layer 2: 服务层 -->
  <rect x="48" y="180" width="704" height="120" rx="12" ry="12" fill="none" stroke="#c4c3bf" stroke-width="1.6" stroke-dasharray="8,5"/>
  <text x="72" y="202" font-size="13" fill="#8c8b87">服务层</text>
  <rect x="80" y="215" width="130" height="56" rx="10" ry="10" fill="#cce0f0"/>
  <text x="145" y="240" text-anchor="middle" font-size="15" font-weight="600" fill="#1c5a82">用户服务</text>
  <text x="145" y="258" text-anchor="middle" font-size="11" fill="#5a96b8">User Service</text>
  <rect x="240" y="215" width="130" height="56" rx="10" ry="10" fill="#cce0f0"/>
  <text x="305" y="240" text-anchor="middle" font-size="15" font-weight="600" fill="#1c5a82">订单服务</text>
  <text x="305" y="258" text-anchor="middle" font-size="11" fill="#5a96b8">Order Service</text>
  <rect x="400" y="215" width="130" height="56" rx="10" ry="10" fill="#cce0f0"/>
  <text x="465" y="240" text-anchor="middle" font-size="15" font-weight="600" fill="#1c5a82">支付服务</text>
  <text x="465" y="258" text-anchor="middle" font-size="11" fill="#5a96b8">Payment Service</text>
  <rect x="560" y="215" width="160" height="56" rx="10" ry="10" fill="#f0d5c6"/>
  <text x="640" y="240" text-anchor="middle" font-size="15" font-weight="600" fill="#8c3b1a">推荐服务</text>
  <text x="640" y="258" text-anchor="middle" font-size="11" fill="#b86a48">LLM-powered</text>

  <!-- 箭头：服务层 → 数据层 -->
  <line x1="400" y1="300" x2="400" y2="330" stroke="#b0afa9" stroke-width="1.4" marker-end="url(#ah)"/>

  <!-- Layer 3: 数据层 -->
  <rect x="48" y="332" width="704" height="120" rx="12" ry="12" fill="none" stroke="#c4c3bf" stroke-width="1.6" stroke-dasharray="8,5"/>
  <text x="72" y="354" font-size="13" fill="#8c8b87">数据层</text>
  <rect x="100" y="367" width="130" height="56" rx="10" ry="10" fill="#ffffff" stroke="#d8d7d3" stroke-width="1.4"/>
  <text x="165" y="392" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a1a">MySQL</text>
  <text x="165" y="410" text-anchor="middle" font-size="11" fill="#999">主从集群</text>
  <rect x="260" y="367" width="130" height="56" rx="10" ry="10" fill="#ffffff" stroke="#d8d7d3" stroke-width="1.4"/>
  <text x="325" y="392" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a1a">Redis</text>
  <text x="325" y="410" text-anchor="middle" font-size="11" fill="#999">缓存集群</text>
  <rect x="420" y="367" width="130" height="56" rx="10" ry="10" fill="#ffffff" stroke="#d8d7d3" stroke-width="1.4"/>
  <text x="485" y="392" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a1a">Kafka</text>
  <text x="485" y="410" text-anchor="middle" font-size="11" fill="#999">消息队列</text>
  <rect x="580" y="367" width="140" height="56" rx="10" ry="10" fill="#ffffff" stroke="#d8d7d3" stroke-width="1.4"/>
  <text x="650" y="392" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a1a">Milvus</text>
  <text x="650" y="410" text-anchor="middle" font-size="11" fill="#999">向量数据库</text>

  <!-- Layer 4: 基础设施 -->
  <rect x="48" y="478" width="704" height="56" rx="12" ry="12" fill="none" stroke="#c4c3bf" stroke-width="1.6" stroke-dasharray="8,5"/>
  <text x="72" y="500" font-size="13" fill="#8c8b87">基础设施</text>
  <rect x="200" y="488" width="80" height="34" rx="7" ry="7" fill="#d4edda"/>
  <text x="240" y="510" text-anchor="middle" font-size="12" font-weight="500" fill="#256b3a">K8s</text>
  <rect x="310" y="488" width="100" height="34" rx="7" ry="7" fill="#d4edda"/>
  <text x="360" y="510" text-anchor="middle" font-size="12" font-weight="500" fill="#256b3a">Prometheus</text>
  <rect x="440" y="488" width="80" height="34" rx="7" ry="7" fill="#d4edda"/>
  <text x="480" y="510" text-anchor="middle" font-size="12" font-weight="500" fill="#256b3a">Grafana</text>
  <rect x="550" y="488" width="80" height="34" rx="7" ry="7" fill="#d4edda"/>
  <text x="590" y="510" text-anchor="middle" font-size="12" font-weight="500" fill="#256b3a">Jaeger</text>
  <line x1="400" y1="452" x2="400" y2="478" stroke="#b0afa9" stroke-width="1.4" marker-end="url(#ah)"/>

</svg>
