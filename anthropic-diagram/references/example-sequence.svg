<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 580" width="820" height="580">
  <defs>
    <style>
      @font-face {
        font-family: 'Anthropic Sans';
        src: url('https://cdn.prod.website-files.com/67ce28cfec624e2b733f8a52/69971a00a3295036497e1a28_AnthropicSans-Roman-Web.woff2') format('woff2');
        font-weight: 100 900; font-style: normal;
      }
      text, tspan { font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
    <marker id="ah" viewBox="0 0 10 7" refX="9.5" refY="3.5" markerWidth="7" markerHeight="5.5" orient="auto">
      <path d="M 0 0.6 L 9.5 3.5 L 0 6.4" fill="none" stroke="#b0afa9" stroke-width="1.3" stroke-linejoin="round"/>
    </marker>
    <marker id="ah-blue" viewBox="0 0 10 7" refX="9.5" refY="3.5" markerWidth="7" markerHeight="5.5" orient="auto">
      <path d="M 0 0.6 L 9.5 3.5 L 0 6.4" fill="none" stroke="#5a96b8" stroke-width="1.3" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect x="0" y="0" width="820" height="580" rx="22" ry="22" fill="#f0efed"/>

  <!-- Title -->
  <text x="410" y="42" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a1a" letter-spacing="4">OAuth 2.0 授权流程</text>

  <!-- 角色头部 -->
  <rect x="60" y="68" width="120" height="44" rx="10" ry="10" fill="#c8e8da"/>
  <text x="120" y="95" text-anchor="middle" font-size="14" font-weight="600" fill="#1a6b50">客户端</text>

  <rect x="270" y="68" width="120" height="44" rx="10" ry="10" fill="#cce0f0"/>
  <text x="330" y="95" text-anchor="middle" font-size="14" font-weight="600" fill="#1c5a82">授权服务器</text>

  <rect x="480" y="68" width="120" height="44" rx="10" ry="10" fill="#cce0f0"/>
  <text x="540" y="95" text-anchor="middle" font-size="14" font-weight="600" fill="#1c5a82">资源服务器</text>

  <rect x="680" y="68" width="100" height="44" rx="10" ry="10" fill="#ffffff" stroke="#d8d7d3" stroke-width="1.4"/>
  <text x="730" y="95" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">用户</text>

  <!-- 生命线 -->
  <line x1="120" y1="112" x2="120" y2="540" stroke="#d8d7d3" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="330" y1="112" x2="330" y2="540" stroke="#d8d7d3" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="540" y1="112" x2="540" y2="540" stroke="#d8d7d3" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="730" y1="112" x2="730" y2="540" stroke="#d8d7d3" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- 步骤 1: 客户端 → 用户 -->
  <line x1="122" y1="155" x2="728" y2="155" stroke="#b0afa9" stroke-width="1.4" marker-end="url(#ah)"/>
  <rect x="310" y="138" width="200" height="24" rx="4" ry="4" fill="#f0efed"/>
  <text x="410" y="155" text-anchor="middle" font-size="12" fill="#1a1a1a" font-weight="500">① 请求授权</text>

  <!-- 步骤 2: 用户 → 授权服务器 -->
  <line x1="728" y1="210" x2="332" y2="210" stroke="#b0afa9" stroke-width="1.4" marker-end="url(#ah)"/>
  <rect x="420" y="193" width="200" height="24" rx="4" ry="4" fill="#f0efed"/>
  <text x="520" y="210" text-anchor="middle" font-size="12" fill="#1a1a1a" font-weight="500">② 用户同意授权</text>

  <!-- 步骤 3: 授权服务器 → 客户端 (授权码) -->
  <line x1="328" y1="265" x2="122" y2="265" stroke="#b0afa9" stroke-width="1.4" marker-end="url(#ah)"/>
  <rect x="145" y="248" width="160" height="24" rx="4" ry="4" fill="#f0efed"/>
  <text x="225" y="265" text-anchor="middle" font-size="12" fill="#1a1a1a" font-weight="500">③ 返回授权码</text>

  <!-- 步骤 4: 客户端 → 授权服务器 (换 token) -->
  <line x1="122" y1="320" x2="328" y2="320" stroke="#5a96b8" stroke-width="1.4" marker-end="url(#ah-blue)"/>
  <rect x="135" y="303" width="190" height="24" rx="4" ry="4" fill="#cce0f0"/>
  <text x="230" y="320" text-anchor="middle" font-size="12" fill="#1c5a82" font-weight="500">④ 授权码换 Token</text>

  <!-- 步骤 5: 授权服务器 → 客户端 (token) -->
  <line x1="328" y1="375" x2="122" y2="375" stroke="#5a96b8" stroke-width="1.4" marker-end="url(#ah-blue)"/>
  <rect x="140" y="358" width="180" height="24" rx="4" ry="4" fill="#cce0f0"/>
  <text x="230" y="375" text-anchor="middle" font-size="12" fill="#1c5a82" font-weight="500">⑤ 返回 Access Token</text>

  <!-- 步骤 6: 客户端 → 资源服务器 -->
  <line x1="122" y1="430" x2="538" y2="430" stroke="#b0afa9" stroke-width="1.4" marker-end="url(#ah)"/>
  <rect x="230" y="413" width="200" height="24" rx="4" ry="4" fill="#f0efed"/>
  <text x="330" y="430" text-anchor="middle" font-size="12" fill="#1a1a1a" font-weight="500">⑥ 携带 Token 请求资源</text>

  <!-- 步骤 7: 资源服务器 → 客户端 -->
  <line x1="538" y1="485" x2="122" y2="485" stroke="#b0afa9" stroke-width="1.4" marker-end="url(#ah)"/>
  <rect x="245" y="468" width="160" height="24" rx="4" ry="4" fill="#c8e8da"/>
  <text x="325" y="485" text-anchor="middle" font-size="12" fill="#1a6b50" font-weight="500">⑦ 返回受保护资源</text>

</svg>
