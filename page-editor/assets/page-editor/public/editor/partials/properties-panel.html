<!-- =====================================================================
     properties-panel.html — Pencil design-synced floating properties panel
     Injected into buildShell() via _ppHtml variable in server/index.js
     ===================================================================== -->

<!-- ── Primary Properties Panel ─────────────────────────────────────── -->
<div id="pp-panel" class="pp-panel" role="complementary" aria-label="属性面板">

  <!-- Header: tag badge + element name + spacer + reset + close -->
  <div class="pp-header">
    <span id="pp-tag" class="pp-tag-badge">div</span>
    <span id="pp-el-name" class="pp-el-name">.hero-title</span>
    <button id="pp-delete-el" class="pp-header-icon pp-header-icon--danger" title="删除元素">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="m19 6-.867 12.142A2 2 0 0 1 16.138 20H7.862a2 2 0 0 1-1.995-1.858L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
    </button>
    <span class="pp-header-spacer"></span>
    <button id="pp-reset-el" class="pp-header-icon" title="恢复修改">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    </button>
    <button id="pp-close" class="pp-header-icon" title="关闭">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>
  </div>

  <div class="pp-divider"></div>

  <!-- Scrollable body — header stays fixed above -->
  <div class="pp-body">

  <!-- ── Section: 状态 (pseudo-state) — only shown when states detected ── -->
  <div class="pp-section" id="pp-section-state" style="display:none">
    <div class="pp-row pp-row--2col">
      <div class="pp-inline-input pp-inline-input--select" title="元素交互状态">
        <span class="pp-inline-label">状态</span>
        <select id="pp-state-select" class="pp-inline-select">
          <option value="">默认</option>
        </select>
        <svg class="pp-chevron" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </div>
    </div>
  </div>
  <div class="pp-divider" id="pp-divider-after-state" style="display:none"></div>

  <!-- ── Section: 坐标 (X / Y) — smart show/hide ─────────────────── -->
  <div class="pp-section" id="pp-section-coords" style="display:none">
    <div class="pp-section-header">
      <span class="pp-section-label">坐标</span>
    </div>
    <div class="pp-row pp-row--2col">
      <div class="pp-inline-input" title="水平位置 (left)">
        <span class="pp-inline-label">X</span>
        <input id="pp-x" class="pp-inline-val" type="text" placeholder="—">
      </div>
      <div class="pp-inline-input" title="垂直位置 (top)">
        <span class="pp-inline-label">Y</span>
        <input id="pp-y" class="pp-inline-val" type="text" placeholder="—">
      </div>
    </div>
  </div>

  <div class="pp-divider" id="pp-divider-after-coords" style="display:none"></div>

  <!-- ── Section: 顺序 (Order — flex/grid children only) ────────────── -->
  <div class="pp-section" id="pp-section-order" style="display:none">
    <div class="pp-section-header">
      <span class="pp-section-label">顺序</span>
      <span class="pp-order-help" id="pp-order-help" title="">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
        <div class="pp-order-tooltip" id="pp-order-tooltip"></div>
      </span>
    </div>
    <div class="pp-row pp-row--order">
      <!-- Order number dropdown (layers icon inserted by JS) -->
      <div id="pp-order-select-wrap" class="pp-order-select-wrap"></div>
      <!-- Arrow buttons group (occupies col2) -->
      <div class="pp-order-arrows">
        <button id="pp-order-prev" class="pp-order-arrow-btn" title="前移" disabled>
          <svg id="pp-order-prev-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        </button>
        <button id="pp-order-next" class="pp-order-arrow-btn" title="后移" disabled>
          <svg id="pp-order-next-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="pp-divider" id="pp-divider-after-order" style="display:none"></div>

  <!-- ── Section: 布局 (unified: mode switcher + W/H + align/gap + padding + margin) ── -->
  <div class="pp-section" id="pp-section-layout">
    <div class="pp-section-header">
      <span class="pp-section-label">布局</span>
    </div>

    <!-- Mode switcher row: [switcher] [wrap toggle] -->
    <div class="pp-mode-row" id="pp-mode-row">
      <div class="pp-mode-switcher" id="pp-mode-switcher">
      <button class="pp-mode-btn" data-mode="block" title="普通布局">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M6 6V7H4V6H6ZM7 5V4C7 3.44772 6.55228 3 6 3H4C3.44772 3 3 3.44772 3 4V5C3 5.55228 3.44772 6 4 6V7L3.7959 6.98926C2.85435 6.8938 2.1062 6.14565 2.01074 5.2041L2 5V4C2 2.89543 2.89543 2 4 2H6C7.10457 2 8 2.89543 8 4V5C8 6.03565 7.21278 6.887 6.2041 6.98926L6 7V6C6.55228 6 7 5.55228 7 5Z"/><path d="M13 9V10H11V9H13ZM14 8V7C14 6.44772 13.5523 6 13 6H11C10.4477 6 10 6.44772 10 7V8C10 8.55228 10.4477 9 11 9V10L10.7959 9.98926C9.85435 9.8938 9.1062 9.14565 9.01074 8.2041L9 8V7C9 5.89543 9.89543 5 11 5H13C14.1046 5 15 5.89543 15 7V8C15 9.03565 14.2128 9.887 13.2041 9.98926L13 10V9C13.5523 9 14 8.55228 14 8Z"/><path d="M7 13V14H5V13H7ZM8 12V11C8 10.4477 7.55228 10 7 10H5C4.44772 10 4 10.4477 4 11V12C4 12.5523 4.44772 13 5 13V14L4.7959 13.9893C3.85435 13.8938 3.1062 13.1457 3.01074 12.2041L3 12V11C3 9.89543 3.89543 9 5 9H7C8.10457 9 9 9.89543 9 11V12C9 13.0357 8.21278 13.887 7.2041 13.9893L7 14V13C7.55228 13 8 12.5523 8 12Z"/></svg>
      </button>
      <button class="pp-mode-btn" data-mode="column" title="纵向自动布局 (flex-direction: column)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M6 6V7H5V6H6ZM7 5V4C7 3.44772 6.55228 3 6 3H5C4.44772 3 4 3.44772 4 4V5C4 5.55228 4.44772 6 5 6V7L4.7959 6.98926C3.85435 6.8938 3.1062 6.14565 3.01074 5.2041L3 5V4C3 2.89543 3.89543 2 5 2H6C7.10457 2 8 2.89543 8 4V5C8 6.03565 7.21278 6.887 6.2041 6.98926L6 7V6C6.55228 6 7 5.55228 7 5Z"/><path d="M6 13V14H5V13H6ZM7 12V11C7 10.4477 6.55228 10 6 10H5C4.44772 10 4 10.4477 4 11V12C4 12.5523 4.44772 13 5 13V14L4.7959 13.9893C3.85435 13.8938 3.1062 13.1457 3.01074 12.2041L3 12V11C3 9.89543 3.89543 9 5 9H6C7.10457 9 8 9.89543 8 11V12C8 13.0357 7.21278 13.887 6.2041 13.9893L6 14V13C6.55228 13 7 12.5523 7 12Z"/><path d="M13.8635 11.0863C14.0455 11.2737 14.0455 11.5776 13.8635 11.765L11.8296 13.8594C11.6475 14.0469 11.3525 14.0469 11.1704 13.8594L9.13653 11.765C8.95449 11.5776 8.95449 11.2737 9.13653 11.0863C9.31857 10.8988 9.61364 10.8988 9.79568 11.0863L11.0339 12.3613V2L11.9661 2L11.9661 12.3613L13.2043 11.0863C13.3864 10.8988 13.6814 10.8988 13.8635 11.0863Z"/></svg>
      </button>
      <button class="pp-mode-btn" data-mode="row" title="横向自动布局 (flex-direction: row)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M5 7V8H4V7H5ZM6 6V5C6 4.44772 5.55228 4 5 4H4C3.44772 4 3 4.44772 3 5V6C3 6.55228 3.44772 7 4 7V8L3.7959 7.98926C2.85435 7.8938 2.1062 7.14565 2.01074 6.2041L2 6V5C2 3.89543 2.89543 3 4 3H5C6.10457 3 7 3.89543 7 5V6C7 7.03565 6.21278 7.887 5.2041 7.98926L5 8V7C5.55228 7 6 6.55228 6 6Z"/><path d="M12 7V8H11V7H12ZM13 6V5C13 4.44772 12.5523 4 12 4H11C10.4477 4 10 4.44772 10 5V6C10 6.55228 10.4477 7 11 7V8L10.7959 7.98926C9.85435 7.8938 9.1062 7.14565 9.01074 6.2041L9 6V5C9 3.89543 9.89543 3 11 3H12C13.1046 3 14 3.89543 14 5V6C14 7.03565 13.2128 7.887 12.2041 7.98926L12 8V7C12.5523 7 13 6.55228 13 6Z"/><path d="M11.0863 9.13653C11.2737 8.95449 11.5776 8.95449 11.765 9.13653L13.8594 11.1704C14.0469 11.3525 14.0469 11.6475 13.8594 11.8296L11.765 13.8635C11.5776 14.0455 11.2737 14.0455 11.0863 13.8635C10.8988 13.6814 10.8988 13.3864 11.0863 13.2043L12.3613 11.9661H2V11.0339H12.3613L11.0863 9.79568C10.8988 9.61364 10.8988 9.31857 11.0863 9.13653Z"/></svg>
      </button>
      <button class="pp-mode-btn" data-mode="grid" title="网格布局 (display: grid)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 12V13H4V12H6ZM13 12V13H11V12H13ZM14 11V10C14 9.44772 13.5523 9 13 9H11C10.4477 9 10 9.44772 10 10V11C10 11.5523 10.4477 12 11 12V13C9.89543 13 9 12.1046 9 11V10C9 8.89543 9.89543 8 11 8H13C14.1046 8 15 8.89543 15 10V11C15 12.1046 14.1046 13 13 13V12C13.5523 12 14 11.5523 14 11ZM7 11V10C7 9.44772 6.55228 9 6 9H4C3.44772 9 3 9.44772 3 10V11C3 11.5523 3.44772 12 4 12V13L3.7959 12.9893C2.78722 12.887 2 12.0357 2 11V10C2 8.89543 2.89543 8 4 8H6C7.10457 8 8 8.89543 8 10V11C8 12.1046 7.10457 13 6 13V12C6.55228 12 7 11.5523 7 11ZM6 6V7H4V6H6ZM13 6V7H11V6H13ZM14 5V4C14 3.44772 13.5523 3 13 3H11C10.4477 3 10 3.44772 10 4V5C10 5.55228 10.4477 6 11 6V7C9.89543 7 9 6.10457 9 5V4C9 2.89543 9.89543 2 11 2H13C14.1046 2 15 2.89543 15 4V5C15 6.10457 14.1046 7 13 7V6C13.5523 6 14 5.55228 14 5ZM7 5V4C7 3.44772 6.55228 3 6 3H4C3.44772 3 3 3.44772 3 4V5C3 5.55228 3.44772 6 4 6V7L3.7959 6.98926C2.78722 6.887 2 6.03565 2 5V4C2 2.89543 2.89543 2 4 2H6C7.10457 2 8 2.89543 8 4V5C8 6.10457 7.10457 7 6 7V6C6.55228 6 7 5.55228 7 5Z" fill="currentColor"/></svg>
      </button>
      </div>
      <button id="pp-wrap-toggle" class="pp-wrap-btn" title="flex-wrap: wrap (换行)" style="visibility:hidden">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M3 12h15a3 3 0 1 1 0 6h-4"/><polyline points="13 16 11 18 13 20"/></svg>
      </button>
    </div>

    <!-- W/H row with Fill/Hug + aspect ratio lock in btn-col -->
    <div class="pp-row pp-row--wh">
      <div class="pp-row__content">
        <div class="pp-inline-input pp-inline-input--wh" title="宽度">
          <span class="pp-inline-label">W</span>
          <input id="pp-w" class="pp-inline-val" type="text" placeholder="auto">
          <span class="pp-wh-mode" id="pp-w-mode-label" data-prop="width">Fill</span>
          <select id="pp-w-mode" class="pp-wh-mode-select" title="宽度模式">
            <option value="fixed">fixed</option>
            <option value="hug">Hug</option>
            <option value="fill">Fill</option>
          </select>
        </div>
        <div class="pp-inline-input pp-inline-input--wh" title="高度">
          <span class="pp-inline-label">H</span>
          <input id="pp-h" class="pp-inline-val" type="text" placeholder="auto">
          <span class="pp-wh-mode" id="pp-h-mode-label" data-prop="height">Hug</span>
          <select id="pp-h-mode" class="pp-wh-mode-select" title="高度模式">
            <option value="fixed">fixed</option>
            <option value="hug">Hug</option>
            <option value="fill">Fill</option>
          </select>
        </div>
      </div>
      <button id="pp-aspect-lock" class="pp-toggle-btn" title="等比例调整">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 9 6-6"/><path d="M21 3h-6"/><path d="M21 3v6"/><path d="m9 15-6 6"/><path d="M3 21h6"/><path d="M3 21v-6"/></svg>
      </button>
    </div>

    <!-- 9-grid alignment + gap (flex/grid only) -->
    <div class="pp-flex-only" id="pp-flex-controls" style="display:none">
      <div class="pp-row pp-row--align-gap">
        <div class="pp-align9-grid" id="pp-align9-grid" title="对齐方式">
          <div class="pp-align9-row">
            <button class="pp-align9-cell" data-jc="flex-start" data-ai="flex-start"><span class="pp-dot"></span><svg class="pp-align9-icon pp-icon-packed" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg><svg class="pp-align9-icon pp-icon-dist" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
            <button class="pp-align9-cell" data-jc="center" data-ai="flex-start"><span class="pp-dot"></span><svg class="pp-align9-icon pp-icon-packed" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg><svg class="pp-align9-icon pp-icon-dist" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
            <button class="pp-align9-cell" data-jc="flex-end" data-ai="flex-start"><span class="pp-dot"></span><svg class="pp-align9-icon pp-icon-packed" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg><svg class="pp-align9-icon pp-icon-dist" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
          </div>
          <div class="pp-align9-row">
            <button class="pp-align9-cell" data-jc="flex-start" data-ai="center"><span class="pp-dot"></span><svg class="pp-align9-icon pp-icon-packed" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg><svg class="pp-align9-icon pp-icon-dist" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
            <button class="pp-align9-cell" data-jc="center" data-ai="center"><span class="pp-dot"></span><svg class="pp-align9-icon pp-icon-packed" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg><svg class="pp-align9-icon pp-icon-dist" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
            <button class="pp-align9-cell" data-jc="flex-end" data-ai="center"><span class="pp-dot"></span><svg class="pp-align9-icon pp-icon-packed" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg><svg class="pp-align9-icon pp-icon-dist" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
          </div>
          <div class="pp-align9-row">
            <button class="pp-align9-cell" data-jc="flex-start" data-ai="flex-end"><span class="pp-dot"></span><svg class="pp-align9-icon pp-icon-packed" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg><svg class="pp-align9-icon pp-icon-dist" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
            <button class="pp-align9-cell" data-jc="center" data-ai="flex-end"><span class="pp-dot"></span><svg class="pp-align9-icon pp-icon-packed" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg><svg class="pp-align9-icon pp-icon-dist" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
            <button class="pp-align9-cell" data-jc="flex-end" data-ai="flex-end"><span class="pp-dot"></span><svg class="pp-align9-icon pp-icon-packed" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg><svg class="pp-align9-icon pp-icon-dist" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
          </div>
        </div>
        <div class="pp-gap-col">
          <div id="pp-jc-dropdown-wrap" style="display:none"></div>
          <div class="pp-inline-input pp-inline-input--gap" title="gap (间距)">
            <svg class="pp-inline-icon" id="pp-gap-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="14" height="6" x="5" y="15" rx="2"/><rect width="10" height="6" x="7" y="3" rx="2"/><path d="M2 21h20"/><path d="M2 3h20"/>
            </svg>
            <input id="pp-gap" class="pp-inline-val" type="text" placeholder="0">
          </div>
        </div>
      </div>
      <!-- Grid-specific controls (visible only in grid mode) -->
      <div class="pp-grid-controls" id="pp-grid-controls" style="display:none">
        <div class="pp-row pp-row--2col">
          <div class="pp-row__content">
            <div class="pp-inline-input" title="grid-template-columns">
              <span class="pp-inline-label">列</span>
              <input id="pp-grid-cols" class="pp-inline-val" type="text" placeholder="1fr 1fr">
            </div>
            <div class="pp-inline-input" title="grid-template-rows">
              <span class="pp-inline-label">行</span>
              <input id="pp-grid-rows" class="pp-inline-val" type="text" placeholder="auto">
            </div>
          </div>
