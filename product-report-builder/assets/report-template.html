<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}} - 产品规划汇报</title>
<style>
  :root {
    --primary: #12B7F5;
    --primary-dark: #0E9FD8;
    --primary-light: #E8F7FE;
    --bg: #F5F7FA;
    --white: #FFFFFF;
    --text: #1D2129;
    --text-secondary: #4E5969;
    --text-light: #86909C;
    --border: #E5E6EB;
    --success: #00B42A;
    --warning: #FF7D00;
    --orange: #FF6A00;
    --purple: #722ED1;
    --shadow: 0 4px 20px rgba(0,0,0,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    height: 100vh;
  }

  /* ============ 整体布局 ============ */
  .layout {
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* 左侧文档区域 */
  .doc-panel {
    flex: 1;
    overflow-y: auto;
    padding: 40px 48px 80px;
    min-width: 0;
  }
  .doc-panel::-webkit-scrollbar { width: 6px; }
  .doc-panel::-webkit-scrollbar-thumb { background: #C9CDD4; border-radius: 3px; }
  .doc-panel::-webkit-scrollbar-track { background: transparent; }

  .page { max-width: 800px; margin: 0 auto; }

  /* 右侧手机预览区域 - iPhone 17 Pro Max 尺寸风格 */
  .preview-panel {
    width: 480px;
    flex-shrink: 0;
    background: #1D2129;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 0;
    position: relative;
    overflow-y: auto;
  }

  .preview-header {
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0.7;
    flex-shrink: 0;
  }
  .preview-header .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--success);
  }

  /* iPhone 17 Pro Max 风格外壳 - 固定高度适配一屏 */
  .phone-frame {
    width: 402px;
    height: calc(100vh - 110px);
    max-height: 820px;
    min-height: 580px;
    flex-shrink: 0;
    background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
    border-radius: 52px;
    padding: 10px;
    position: relative;
    box-shadow:
      0 0 0 1.5px #444,
      0 0 0 3px #222,
      inset 0 0 4px rgba(255,255,255,0.03),
      0 24px 72px rgba(0,0,0,0.55),
      0 8px 32px rgba(0,0,0,0.35);
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    border-radius: 42px;
    overflow: hidden;
    background: #fff;
    position: relative;
  }

  /* 灵动岛 - iPhone 17 Pro 更宽更扁 */
  .phone-notch {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 30px;
    background: #000;
    border-radius: 22px;
    z-index: 10;
  }

  .phone-screen iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 42px;
  }

  /* 底部导航条 - iPhone 17 Pro 更宽 */
  .phone-home-bar {
    position: absolute;
    bottom: 7px;
    left: 50%;
    transform: translateX(-50%);
    width: 142px;
    height: 5px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
    z-index: 10;
  }

  /* 预览底部快捷导航 */
  .preview-nav {
    margin-top: 16px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 430px;
  }
  .preview-nav a {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.65);
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 14px;
    text-decoration: none;
    transition: all 0.2s;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .preview-nav a:hover {
    background: rgba(18,183,245,0.15);
    color: var(--primary);
    border-color: rgba(18,183,245,0.3);
  }
  .preview-nav a.active {
    background: rgba(18,183,245,0.2);
    color: var(--primary);
    border-color: rgba(18,183,245,0.4);
  }

  /* ============ 文档内容样式 ============ */

  /* 封面 */
  .cover {
    background: linear-gradient(135deg, {{cover_gradient_start|#12B7F5}} 0%, {{cover_gradient_end|#722ED1}} 100%);
    border-radius: 20px;
    padding: 56px 44px;
    color: white;
    margin-bottom: 40px;
    position: relative;
    overflow: hidden;
  }
  .cover::after {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 240px; height: 240px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }
  .cover::before {
    content: '';
    position: absolute;
    bottom: -40px; left: 40%;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .cover .tag {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(4px);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 13px;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }
  .cover h1 {
    font-size: 34px;
    font-weight: 700;
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }
  .cover .subtitle {
    font-size: 16px;
    opacity: 0.85;
    position: relative;
    z-index: 1;
  }
  .cover .meta {
    margin-top: 28px;
    font-size: 13px;
    opacity: 0.6;
    position: relative;
    z-index: 1;
  }

  /* 章节标题 - 带编号圆徽 */
  .section { margin-bottom: 40px; }
  .section-title {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }
  .section-title .num {
    width: 36px; height: 36px;
    background: var(--primary);
    color: white;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
    flex-shrink: 0;
  }
  .section-title h2 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }

  /* 卡片基础 */
  .card {
    background: var(--white);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }

  /* 产品定位描述块 */
  .positioning {
    background: linear-gradient(135deg, var(--primary-light) 0%, #F0E8FF 100%);
    border-radius: 16px;
    padding: 24px 28px;
    margin-bottom: 20px;
    border-left: 4px solid var(--primary);
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.8;
  }
  .positioning strong {
    color: var(--primary-dark);
  }

  /* 痛点四宫格 */
  .pain-points {
    display: grid;
    grid-template-columns: repeat({{pain_columns|4}}, 1fr);
    gap: 16px;
    margin-top: 20px;
  }
  .pain-point {
    background: var(--white);
    border-radius: 14px;
    padding: 24px 18px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    text-align: center;
  }
  .pain-point .icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    margin: 0 auto 12px;
  }
  .pain-point:nth-child(1) .icon { background: #FFF3E8; }
  .pain-point:nth-child(2) .icon { background: #FFECE8; }
  .pain-point:nth-child(3) .icon { background: #E8F7FE; }
  .pain-point:nth-child(4) .icon { background: #F0E8FF; }
  .pain-point h4 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
  }
  .pain-point p {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  /* 痛点卡片版 — 带编号+标题+描述的双列卡片（AI试聊风格） */
  .pain-point .pp-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    text-align: left;
  }
  .pain-point .pp-num {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--primary);
    color: white;
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .pain-point .pp-header h4 {
    margin: 0;
    font-size: 16px;
  }
  /* 卡片版痛点的描述左对齐 */
  .pain-point:has(.pp-header) {
    text-align: left;
    padding: 20px 24px;
  }
  .pain-point:has(.pp-header) p {
    font-size: 14px;
    line-height: 1.7;
  }

  /* 受众标签云 */
  .audience-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 16px;
  }
  .audience-tags span {
    background: var(--primary-light);
    color: var(--primary-dark);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 500;
  }

  /* 功能模块卡片 - 可点击跳转 demo（彩色左边框） */
  .feature-card {
    background: var(--white);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .feature-card:hover {
    box-shadow: 0 8px 30px rgba(18,183,245,0.12);
    border-color: rgba(18,183,245,0.3);
    transform: translateY(-2px);
  }
  .feature-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
  }
  .feature-card:nth-child(1)::before { background: var(--primary); }
  .feature-card:nth-child(2)::before { background: var(--success); }
  .feature-card:nth-child(3)::before { background: var(--orange); }
  .feature-card:nth-child(4)::before { background: var(--purple); }

  .feature-card .feature-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }
  .feature-card .feature-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .feature-card:nth-child(1) .feature-icon { background: var(--primary-light); }
  .feature-card:nth-child(2) .feature-icon { background: #E8FFEA; }
  .feature-card:nth-child(3) .feature-icon { background: #FFF3E8; }
  .feature-card:nth-child(4) .feature-icon { background: #F0E8FF; }

  .feature-card .feature-header h3 {
    font-size: 18px;
    font-weight: 700;
  }

  .feature-card .feature-row {
    display: flex;
    gap: 24px;
    margin-top: 12px;
  }
  .feature-card .feature-row .label {
    font-size: 13px;
    color: var(--text-light);
    white-space: nowrap;
    min-width: 70px;
    padding-top: 2px;
  }
  .feature-card .feature-row .value {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.7;
  }

  /* 点击提示 */
  .feature-card .click-hint {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 11px;
    color: var(--primary);
    opacity: 0;
    transition: opacity 0.2s;
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--primary-light);
    padding: 4px 10px;
    border-radius: 12px;
  }
  .feature-card:hover .click-hint {
    opacity: 1;
  }

  /* 核心亮点框 - 黄色渐变 */
  .highlight-box {
    background: linear-gradient(135deg, #FFF9E6 0%, #FFF1E0 100%);
    border-radius: 16px;
    padding: 24px 28px;
    margin-top: 24px;
    border: 1px solid #FFE4BA;
  }
  .highlight-box h4 {
    font-size: 15px;
    font-weight: 700;
    color: var(--orange);
    margin-bottom: 14px;
  }
  .highlight-box ul {
    list-style: none;
    padding: 0;
  }
  .highlight-box ul li {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.8;
    padding-left: 20px;
    position: relative;
  }
  .highlight-box ul li::before {
    content: '●';
    position: absolute;
    left: 0;
    color: var(--orange);
  }

  /* 定价表格 */
  .pricing-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .pricing-table th {
    background: var(--primary);
    color: white;
    font-weight: 600;
    font-size: 14px;
    padding: 14px 20px;
    text-align: center;
  }
  .pricing-table td {
    background: var(--white);
    font-size: 14px;
    padding: 14px 20px;
    text-align: center;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border);
  }
  .pricing-table tr:last-child td { border-bottom: none; }
  .pricing-table .highlight-row td {
    background: var(--primary-light);
    font-weight: 600;
    color: var(--primary-dark);
  }
  .pricing-table .price {
    font-size: 20px;
    font-weight: 700;
    color: var(--primary);
  }

  /* 用户类型对比卡 */
  .user-types {
    display: grid;
    grid-template-columns: repeat({{type_columns|3}}, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }
  .user-type-card {
    background: var(--white);
    border-radius: 14px;
    padding: 24px 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    text-align: center;
    transition: transform 0.2s;
  }
  .user-type-card.featured {
    border: 2px solid var(--primary);
    position: relative;
  }
  .user-type-card.featured::after {
    content: '{{featured_label|推荐}}';
    position: absolute;
    top: -12px; right: 16px;
    background: var(--primary);
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 10px;
  }
  .user-type-card .type-name {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .user-type-card .type-price {
    font-size: 22px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 10px;
  }
  .user-type-card .type-price span {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-light);
  }
  .user-type-card .type-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  /* 定价说明 */
  .pricing-notes {
    margin-top: 20px;
  }
  .pricing-notes .note-item {
    background: var(--white);
    border-radius: 12px;
    padding: 18px 24px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .pricing-notes .note-item h4 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .pricing-notes .note-item p {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.7;
  }

  /* 超额计费横幅 */
  .extra-fee {
    background: linear-gradient(135deg, var(--primary-light) 0%, #F0E8FF 100%);
    border-radius: 14px;
    padding: 20px 28px;
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .extra-fee .fee-amount {
    font-size: 28px;
    font-weight: 700;
    color: var(--primary);
    white-space: nowrap;
  }
  .extra-fee .fee-amount span {
    font-size: 14px;
    font-weight: 400;
    color: var(--text-secondary);
  }
  .extra-fee .fee-desc {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  /* 页脚 */
  .footer {
    text-align: center;
    padding-top: 40px;
    border-top: 1px solid var(--border);
    margin-top: 48px;
  }
  .footer p {
    font-size: 13px;
    color: var(--text-light);
  }

  /* 竞品卡片 */
  .competitor-list { display: grid; grid-template-columns: repeat({{comp_columns|2}}, 1fr); gap: 16px; margin-top: 20px; }
  .competitor-card {
    background: var(--white);
    border-radius: 14px;
    padding: 24px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .competitor-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .competitor-header h3 { font-size: 16px; font-weight: 700; color: var(--text); }
  .comp-tag {
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 10px; white-space: nowrap;
  }
  .tag-subscribe { background: #E8F7FE; color: var(--primary-dark); }
  .tag-pergroup { background: #E8FFEA; color: var(--success); }
  .tag-fun { background: #FFF3E8; color: var(--warning); }
  .tag-safe { background: #F0E8FF; color: var(--purple); }
  .comp-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 14px; line-height: 1.5; }
  .comp-detail { display: flex; flex-direction: column; gap: 6px; }
  .comp-detail span { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
  .comp-detail strong { color: var(--text); }

  /* 子模块 */
  .sub-section { margin-top: 32px; }
  .sub-section-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 20px;
    padding-left: 12px;
    border-left: 3px solid var(--primary);
  }

  /* 策略引导语 — 章节开头的提纲挈领描述 */
  .strategy-intro {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.8;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px dashed #FFE4BA;
  }
  .strategy-intro strong {
    color: var(--orange);
  }

  /* 滚动同步提示 toast */
  .sync-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(29,33,41,0.9);
    color: #fff;
    font-size: 13px;
    padding: 10px 24px;
    border-radius: 24px;
    z-index: 100;
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
    pointer-events: none;
    backdrop-filter: blur(8px);
  }
  .sync-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ===== Responsive Adjustments ===== */
  @media (max-width: 1024px) {
    .layout { flex-direction: column; }
    .doc-panel { height: 45%; padding: 24px 28px 60px; }
    .preview-panel { width: 100%; height: 55%; padding: 12px 0; }
    .phone-frame { width: 320px; border-radius: 42px; max-height: 600px; min-height: 420px; }
    .phone-screen { border-radius: 32px; }
    .phone-screen iframe { border-radius: 32px; }
    .phone-notch { width: 100px; height: 26px; border-radius: 18px; }
    .pain-points { grid-template-columns: repeat(2, 1fr); }
    .user-types { grid-template-columns: 1fr; }
    .competitor-list { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="layout">

  <!-- ====== 左侧文档区域 ====== -->
  <div class="doc-panel">
    <div class="page">

      <!-- 封面 -->
      <div class="cover">
        <div class="tag">{{cover_tag|产品规划汇报}}</div>
        <h1>{{title}}</h1>
        <div class="subtitle">{{subtitle|}}</div>
        <div class="meta">{{meta_date|}} · {{team_name|QQ增值团队}}</div>
      </div>

      {{document_content}}

      <!-- 页脚 -->
      <div class="footer">
        <p>{{team_name|QQ增值团队}} · {{footer_date|}}</p>
      </div>

    </div>
  </div>

  <!-- ====== 右侧手机预览区域 ====== -->
  <div class="preview-panel">
    <div class="preview-header">
      <div class="dot"></div>
      <span>实机预览 · 可直接操作</span>
    </div>

    <div class="phone-frame">
      <div class="phone-screen">
        <div class="phone-notch"></div>
        <iframe id="demo-frame" src="{{demo_url}}"></iframe>
        <div class="phone-home-bar"></div>
      </div>
    </div>

    {{preview_nav|}}
  </div>

</div>

<!-- 同步提示 toast -->
<div class="sync-toast" id="sync-toast"></div>

<script>
(function() {
  const frame = document.getElementById('demo-frame');
  const navLinks = document.querySelectorAll('#preview-nav a');
  const featureCards = document.querySelectorAll('.feature-card[data-demo]');
  const svipCard = document.querySelector('.user-type-card.featured[data-demo]');
  const toast = document.getElementById('sync-toast');
  let toastTimer = null;

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
  }

  // 切换 demo 页面
  function navigateTo(page) {
    if (!page) return;
    // Resolve base URL from current page location
    const basePath = (function() {
      const path = window.location.pathname;
      return path.substring(0, path.lastIndexOf('/') + 1);
    })();
    frame.src = basePath + page;

    // Update nav active state
    navLinks.forEach(a => {
      a.classList.toggle('active', a.dataset.page === page || a.getAttribute('href') === page);
    });
  }

  // 导航栏点击
  navLinks.forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      const page = a.dataset.page || a.getAttribute('href');
      navigateTo(page);
    });
  });

  // 功能卡片点击 → 右侧跳转对应 demo
  featureCards.forEach(card => {
    card.addEventListener('click', () => {
      const page = card.dataset.demo;
      const scrollTarget = card.dataset.scroll || '';
      navigateTo(page);

      if (scrollTarget && page) {
        frame.onload = function() {
          try {
            setTimeout(() => {
              frame.contentWindow.postMessage({
                type: 'SCROLL_TO',
                targetId: scrollTarget
              }, '*');
            }, 800);
          } catch(e) {}
          frame.onload = null;
        };
      }

      showToast('已跳转至：' + (card.querySelector('h3')?.textContent || page));
    });
  });

  // Featured type card click
  if (svipCard) {
    svipCard.addEventListener('click', () => {
      navigateTo(svipCard.dataset.demo);
      showToast('已跳转至：' + (svipCard.querySelector('.type-name')?.textContent || ''));
    });
  }

  // 监听 iframe 内导航，同步底部导航高亮
  let lastSrc = frame.src;
  setInterval(() => {
    try {
      const currentSrc = frame.src;
      if (currentSrc !== lastSrc) {
        lastSrc = currentSrc;
        const page = currentSrc.split('/').pop() || '';
        navLinks.forEach(a => {
          const targetPage = a.dataset.page || a.getAttribute('href');
          a.classList.toggle('active', targetPage === page);
        });
      }
    } catch(e) {}
  }, 500);

  // 监听 Demo iframe 内部发出的页面切换消息（postMessage）
  // 注意：使用 '*' 作为 origin 以兼容 file:// 协议（本地打开时 origin 为 null）
  window.addEventListener('message', function(e) {
    try {
      const data = e.data;
      if (data && data.action === 'switchPage' && data.url) {
        const page = data.url.split('/').pop() || data.url;
        navigateTo(page);
      }
    } catch(e2) {}
  });

})();
</script>

</body>
</html>
